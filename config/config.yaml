models:
  qwen7b:
    name: "Qwen_7B"
    path: "Qwen/Qwen2.5-7B-Instruct"
  qwen7b_ckpt:
    name: "Qwen_7B_ckpt"
    path: "/checkpoints/qwen7b_finetuned_epoch3"  # local path
  llama8b:
    name: "Llama_8B"
    path: "meta-llama/Llama-3.1-8B"

default_model: "qwen7b" # should keep it the same as the key

seed: 42

dataset:
  truthfulqa:
    name: "truthfulqa"
    hf_name: "truthful_qa"
    hf_config: "generation"
    split: "validation"
    n_samples: null
    raw_path: "data/raw/truthfulqa.csv"
  simpleqa:
    name: "simpleqa"
    url: "https://openaipublic.blob.core.windows.net/simple-evals/simple_qa_test_set.csv"
    n_samples: null
    split: null
    raw_path: "data/raw/simpleqa.csv"
  strategyqa:
    name: "strategyqa"
    hf_name: "ChilleD/StrategyQA"
    split: "train"
    n_samples: null
    raw_path: "data/raw/strategyqa.csv"

default_dataset: "truthfulqa"

paths:
  output_dir: "results/"

experiment:
  logit_lens: true
  probe: true
  geometry: true
